<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>TTMMPay</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* TOP MENU */
        .topbar {
            height: 60px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .topbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* LEFT BILL LIST */
        .sidebar {
            width: 250px;
            background: #34495e;
            color: white;
            overflow-y: auto;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #2c3e50;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        /* RIGHT MAIN PANEL */
        .main {
            flex: 1;
            padding: 20px;
            background: #ecf0f1;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

    </style>

</head>

<body>

    <!-- TOP MENU -->
    <div class="topbar">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="container">

        <!-- LEFT: DATES -->
        <div class="sidebar">
            <h3>Dates</h3>
            {% for year, months in dates_by_year.items %}
                <div style="font-weight:bold; margin-top:5px;">{{ year }}</div>
                {% for month, days in months.items %}
                    <div style="padding-left:10px; font-weight:bold;">{{ month }}</div>
                    <div style="padding-left:20px;">
                        {% for day in days %}
                            <a href="#" onclick="loadBills('{{ day|date:'Y-m-d' }}')">{{ day|date:'d' }}</a><br>
                        {% endfor %}
                    </div>
                {% endfor %}
            {% endfor %}
        </div>

        <style>
        .sidebar a {
            color: #FFD966;
            text-decoration: none;
        }
        .sidebar a:hover {
            text-decoration: underline;
        }
        </style>

        <script>
        function toggleVisibility(id){
            const el = document.getElementById(id);
            if(!el) return;
            el.classList.toggle('hidden');

            // rotate arrow
            const arrow = el.previousElementSibling.querySelector('span');
            if(arrow){
                if(el.classList.contains('hidden')) arrow.innerHTML = '&#9658;'; // right arrow
                else arrow.innerHTML = '&#9660;'; // down arrow
            }
        }
        </script>
        <!-- RIGHT: DYNAMIC CONTENT -->
        <div class="main">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</body>
</html>
