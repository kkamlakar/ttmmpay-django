<!DOCTYPE html>
<html>

{% load static %}

<head>
    <title>TTMMPay</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* TOP MENU */
        .topbar {
            height: 60px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .topbar a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* LEFT BILL LIST */
        .sidebar {
            width: 250px;
            background: #34495e;
            color: white;
            overflow-y: auto;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid #2c3e50;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        /* RIGHT MAIN PANEL */
        .main {
            flex: 1;
            padding: 20px;
            background: #ecf0f1;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .sidebar div {
            cursor: pointer;
            padding: 8px 12px;
        }

        .sidebar div:hover {
            background: #1abc9c;
        }

    </style>

</head>

<body>

    <!-- TOP MENU -->
    <div class="topbar">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="container">

        <!-- LEFT: DATES -->
        <div class="sidebar">
            <h3>Dates</h3>
            {% for year, months in dates_by_year.items %}
            <div onclick="toggle('year-{{year}}')">
                {{ year }}
            </div>

            <div id="year-{{year}}" style="display:none;">
                {% for month, days in months.items %}

                <div onclick="toggle('month-{{year}}-{{month}}')">
                    {{ month }}
                </div>

                <div id="month-{{year}}-{{month}}" style="display:none;">
                    {% for day in days %}
                    <div onclick="event.stopPropagation(); loadBills('{{ day }}')">
                        {{ day|slice:"-2:" }}
                    </div>
                    {% endfor %}
                </div>

                {% endfor %}
            </div>
            {% endfor %}
        </div>

        <style>
        .sidebar a {
            color: #FFD966;
            text-decoration: none;
        }
        .sidebar a:hover {
            text-decoration: underline;
        }
        </style>

        <script>
        function toggle(id) {
            var el = document.getElementById(id);
            if (el.style.display === "none" || el.style.display === "") {
                el.style.display = "block";
            } else {
                el.style.display = "none";
            }
        }
        </script>

        <!-- RIGHT: DYNAMIC CONTENT -->
        <div class="main">
            {% block content %}
            {% endblock %}
        </div>    
    </div>

</body>
</html>
