{% extends 'base_dashboard.html' %}

{% block content %}

<div style="display:flex; gap:20px;">

    <!-- LEFT PART OF MAIN: BILLS -->
    <div style="width:250px;">
        <div class="card">
            <h3>Bills</h3>

            <div id="billList">
                <p>Select a date</p>
            </div>
        </div>
    </div>

    <!-- RIGHT PART: CONTENT -->
    <div style="flex:1;">
        <iframe id="contentFrame"
                src="{% url 'ttmmpage' %}" 
                style="width:100%; height:80vh; border:none;">
        </iframe>
    </div>

</div>

<script>

const billsData = {{ bills_by_date|safe }};

function loadBills(date){

    const billList = document.getElementById("billList");
    billList.innerHTML = "";

    const bills = billsData[date];

    if(!bills){
        billList.innerHTML = "<p>No bills</p>";
        return;
    }

    bills.forEach(billId => {

        const div = document.createElement("div");

        div.innerHTML = `<a href="#" onclick="openSummary(${billId})">
                            Bill ${billId}
                         </a>`;

        billList.appendChild(div);
    });
}

function openSummary(billId){
    document.getElementById("contentFrame").src = `/summary/${billId}/`;
}

// Auto-load latest
window.onload = function(){
    const firstDate = Object.keys(billsData)[0];
    if(firstDate){
        loadBills(firstDate);
    }
}

</script>

{% endblock %}
