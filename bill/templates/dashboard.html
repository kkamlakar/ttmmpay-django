{% extends 'base_dashboard.html' %}

{% block content %}

<div style="display:flex; gap:20px;">

    <!-- LEFT: BILLS -->
    <div style="width:250px;">
        <div class="card">
            <h3>Bills</h3>

            <div id="billList">
                <p>Select a date</p>
            </div>
        </div>
    </div>

    <!-- RIGHT: CONTENT -->
    <div style="flex:1;">
        <iframe id="contentFrame"
                src="{% url 'ttmmpage' %}" 
                style="width:100%; height:80vh; border:none;">
        </iframe>
    </div>

</div>

<script>

const billsData = {{ bills_by_date|safe }};

function loadBills(date){

    console.log("CLICKED DATE:", date);
    console.log("AVAILABLE KEYS:", Object.keys(billsData));

    const billList = document.getElementById("billList");
    billList.innerHTML = "";

    const bills = billsData[date];

    if(!bills || bills.length === 0){
        console.log("NO MATCH");
        billList.innerHTML = "<p>No bills</p>";
        return;
    }

    console.log("FOUND:", bills);

    bills.forEach(bill => {
        const div = document.createElement("div");

        div.innerHTML = `<a href="#" onclick="openSummary(${bill.id})">
                            ${bill.name}
                        </a>`;

        billList.appendChild(div);
    });
}


function openSummary(billId){
    document.getElementById("contentFrame").src = `/summary/${billId}/`;
}

function loadAllBills(){

    const billList = document.getElementById("billList");
    billList.innerHTML = "";

    Object.values(billsData).forEach(bills => {

        bills.forEach(bill => {

            const div = document.createElement("div");

            div.innerHTML = `<a href="#" onclick="openSummary(${bill.id})">
                                ${bill.name}
                            </a>`;

            billList.appendChild(div);
        });
    });
}

window.onload = function(){
    loadAllBills();
}

</script>

{% endblock %}
