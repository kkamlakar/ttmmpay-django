<!DOCTYPE html>
<html>

{% load static %}

<head>
<title>TTMMPay Login</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT SIDE */
.left-panel{
    flex:1;
}

.left-panel img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT SIDE */
.right-panel{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;

    background: url("{% static 'Dutch_Pay.png' %}") no-repeat center;
    background-size: cover;
    position: relative;
}

/* OVERLAY (BLUR + DARK EFFECT) */
.right-panel::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background: rgba(0,0,0,0.5);  /* control visibility */
    backdrop-filter: blur(6px);   /* blur effect */
}

.login-box{
    background:#9BC264;
    padding:35px;
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
    backdrop-filter: blur(6px);
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

input:focus{
    border-color:#2c7be5;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#F7F6D3;
    border:none;
    color:black;
    font-size:15px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#FFC570;
}

.error{
    color:red;
    margin-top:10px;
}

.signup{
    margin-top:15px;
    font-size:14px;
}

.signup a{
    color:#1A05A2;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <!-- LEFT PANEL (Image) -->
    <div class="left-panel">
        <img src="{% static 'Dutch_Pay.png' %}" alt="Login Image">
    </div>

    <!-- RIGHT PANEL (Your existing login box) -->
    <div class="right-panel">

        <div class="login-box">

            <h2>TTMMPay Login</h2>

            <form method="post">
                {% csrf_token %}

                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>
            </form>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <p class="signup">
                Don't have an account? 
                <a href="{% url 'register' %}">Sign Up</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
