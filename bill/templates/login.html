<!DOCTYPE html>
<html>

<head>
<title>TTMMPay Login</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:35px;
    width:320px;
    border-radius:8px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    text-align:center;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
}

input:focus{
    border-color:#2c7be5;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#2c7be5;
    border:none;
    color:white;
    font-size:15px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#1a5ed6;
}

.error{
    color:red;
    margin-top:10px;
}

.signup{
    margin-top:15px;
    font-size:14px;
}

.signup a{
    color:#2c7be5;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<h2>TTMMPay Login</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<p class="signup">
Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
</p>

</div>

</body>

</html>
