<!DOCTYPE html>
<html>

<head>
<title>TTMMPay Register</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.register-box{
    background:white;
    padding:35px;
    width:350px;
    border-radius:8px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

input:focus{
    border-color:#2c7be5;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#2c7be5;
    border:none;
    color:white;
    font-size:15px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#1a5ed6;
}

.error{
    color:red;
    margin-top:10px;
}

.login-link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.login-link a{
    color:#2c7be5;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<form method="post">

{% csrf_token %}

<label>Full Name</label>
<input type="text" name="personname" placeholder="Enter your full name" required>

<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>

<label>Username</label>
<input type="text" name="username" placeholder="Choose a username" required>

<label>Password</label>
<input type="password" name="password" placeholder="Enter password" required>

<label>Retype Password</label>
<input type="password" name="retype_password" placeholder="Retype password" required>

<button type="submit">Register</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<div class="login-link">
Already have an account? <a href="{% url 'login' %}">Login</a>
</div>

</div>

{% if success %}

<script>
alert("Registration Successful!");
window.location.href = "/";
</script>

{% endif %}

</body>

</html>
