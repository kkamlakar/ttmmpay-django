<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    
    <label>Full Name:</label><br>
    <input type="text" name="personname" placeholder="Enter your full name" required><br><br>
    
    <label>Email:</label><br>
    <input type="email" name="email" placeholder="Enter your email" required><br><br>
    
    <label>Username:</label><br>
    <input type="text" name="username" placeholder="Choose a username" required><br><br>
    
    <label>Password:</label><br>
    <input type="password" name="password" placeholder="Enter password" required><br><br>
    
    <label>Retype Password:</label><br>
    <input type="password" name="retype_password" placeholder="Retype password" required><br><br>
    
    <button type="submit">Register</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% if success %}

<script>
alert("Registration Successful!");

window.location.href = "/";
</script>

{% endif %}
